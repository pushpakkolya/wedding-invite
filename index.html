<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Wedding Invite</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Great+Vibes&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="sparkles"></div>

<!-- ENVELOPE -->
<div class="envelope-container" onclick="openEnvelope()">
  <div class="envelope" id="envelope">
    <div class="envelope-back"></div>
    <div class="letter"><p>For You 💌</p></div>
    <div class="flap"></div>
  </div>
</div>

<!-- MAIN REVEAL -->
<div class="main hidden" id="main">

  <h1 class="names">Pushpak ❤️ Drishya</h1>
  <p class="tagline">invite you to our</p>

  <div class="card-container">
    <div class="invite-card" onclick="openPage('weddingPage')">
      <h2>Wedding</h2>
    </div>

    <div class="invite-card" onclick="openPage('receptionPage')">
      <h2>Reception</h2>
    </div>
  </div>

</div>

<!-- WEDDING PAGE -->
<div class="page hidden" id="weddingPage">
  <h1>Wedding</h1>

  <img src="Wedding.png" class="hero-img"/>

  <div class="details">
    <p>📅 12 Dec 2026</p>
    <p>⏰ 9:30 AM</p>
    <p>📍 Bangalore</p>
  </div>

  <div class="bottom-nav" onclick="openPage('receptionPage')">
    → Go to Reception
  </div>
</div>

<!-- RECEPTION PAGE -->
<div class="page hidden" id="receptionPage">
  <h1>Reception</h1>

  <img src="Reception.png" class="hero-img"/>

  <div class="details">
    <p>📅 13 Dec 2026</p>
    <p>⏰ 7:00 PM</p>
    <p>📍 Bangalore</p>
  </div>

  <div class="bottom-nav" onclick="openPage('weddingPage')">
    → Go to Wedding
  </div>
</div>

<div class="petals"></div>

<script src="script.js"></script>
</body>
</html>
