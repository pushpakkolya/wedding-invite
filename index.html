<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Wedding Invite</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Great+Vibes&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Sparkles -->
  <div class="sparkles"></div>

  <!-- Envelope -->
<div class="envelope-container" onclick="openEnvelope()">
  <div class="envelope" id="envelope">

    <div class="envelope-back"></div>

    <div class="letter" id="letter">
      <p>Open 💌</p>
    </div>

    <div class="flap"></div>

  </div>
</div>

  <!-- Content -->
<div class="content hidden" id="content">
  <h1 class="names">Pushpak <span>❤️</span> Drishya</h1>
  <p class="tagline">Together with their families invite you</p>

  <div class="card">
    <h2>Wedding</h2>
    <p>📅 12 Dec 2026</p>
    <p>📍 Bangalore</p>
    <a href="https://maps.google.com" target="_blank" class="map-btn">View Location</a>
  </div>

  <div class="card">
    <h2>Reception</h2>
    <p>📅 13 Dec 2026</p>
    <p>📍 Bangalore</p>
    <a href="https://maps.google.com" target="_blank" class="map-btn">View Location</a>
  </div>
</div>

  <script src="script.js"></script>
  <div class="petals"></div>
</body>
</html>
