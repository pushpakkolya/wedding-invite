<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Wedding Invite</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Great+Vibes&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Sparkles -->
  <div class="sparkles"></div>

  <!-- Envelope -->
  <div class="envelope-container" onclick="openEnvelope()">
    <div class="envelope">
      <div class="flap"></div>
      <div class="letter">
        <p>Open Your Invite 💌</p>
      </div>
    </div>
  </div>

  <!-- Content -->
  <div class="content hidden" id="content">
    <h1 class="names">Pushpak <span>❤️</span> Drishya</h1>
    <p class="tagline">Together with their families</p>

    <div class="card">
      <h2>Wedding</h2>
      <p>📅 Add Date</p>
      <p>📍 Add Venue</p>
    </div>

    <div class="card">
      <h2>Reception</h2>
      <p>📅 Add Date</p>
      <p>📍 Add Venue</p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
