<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Wedding Invite</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Envelope Section -->
  <div class="envelope-container" onclick="openEnvelope()">
    <div class="envelope">
      <div class="flap"></div>
      <div class="letter">
        <p>Tap to Open 💌</p>
      </div>
    </div>
  </div>

  <!-- Main Content -->
  <div class="content hidden" id="content">
    <h1>Pushpak ❤️ Drishya</h1>
    <p class="tagline">We're getting married!</p>

    <div class="card">
      <h2>Wedding</h2>
      <p>📅 Date: Add here</p>
      <p>📍 Venue: Add here</p>
    </div>

    <div class="card">
      <h2>Reception</h2>
      <p>📅 Date: Add here</p>
      <p>📍 Venue: Add here</p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
