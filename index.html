<!DOCTYPE html>
<html lang="en">
<head> 
  <meta charset="UTF-8">
  <title>Wedding Invite</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins&family=Pacifico&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: "Poppins", sans-serif;
      background: linear-gradient(to bottom, #fff0f5, #ffe4ec);
      overflow: hidden;
    }

    .center {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    .envelope {
      position: relative;
      width: 260px;
      height: 180px;
      cursor: pointer;
    }

    .body {
      width: 100%;
      height: 100%;
      background: #f8c8dc;
      border-radius: 8px;
      position: absolute;
    }

    .flap {
      width: 100%;
      height: 90px;
      background: #f4a7c0;
      position: absolute;
      top: 0;
      transform-origin: top;
      transition: transform 0.8s;
      border-radius: 8px 8px 0 0;
    }

    .letter {
      position: absolute;
      width: 90%;
      height: 120px;
      background: white;
      left: 5%;
      top: 30px;
      border-radius: 10px;
      display: flex;
      justify-content: center;
      align-items: center;
      transform: translateY(0);
      opacity: 0;
      transition: all 0.8s ease 0.5s;
    }

    .open .flap {
      transform: rotateX(-180deg);
    }

    .open .letter {
      transform: translateY(-140px);
      opacity: 1;
    }

    .tap {
      margin-bottom: 20px;
      color: #a36b7c;
    }

    .home {
      display: none;
      text-align: center;
      padding: 40px;
    }

    .title {
      font-family: "Pacifico", cursive;
      font-size: 2.5rem;
      color: #b76e79;
    }

    .card {
      margin: 20px auto;
      padding: 20px;
      width: 250px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }
  </style>
</head>

<body>

<div class="center" id="intro">
  <p class="tap">Tap to open 💌</p>

  <div class="envelope" onclick="openEnvelope()" id="env">
    <div class="letter">You're Invited 💖</div>
    <div class="flap"></div>
    <div class="body"></div>
  </div>
</div>

<div class="home" id="home">
  <h1 class="title">Pushpak 💖 Drishya</h1>
  <p>Save the Date</p>

  <div class="card">
    <h2>Wedding 💍</h2>
    <p>12 Dec 2026</p>
    <p>Venue Name</p>
  </div>

  <div class="card">
    <h2>Reception 🎉</h2>
    <p>14 Dec 2026</p>
    <p>Venue Name</p>
  </div>
</div>

<script>
function openEnvelope() {
  const env = document.getElementById("env");
  env.classList.add("open");

  setTimeout(() => {
    document.getElementById("intro").style.display = "none";
    document.getElementById("home").style.display = "block";
    document.body.style.overflow = "auto";
  }, 1800);
}
</script>

</body>
</html>
